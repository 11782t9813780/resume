MODULES.panel=function(host,done){
  Scene.buildMonument&&Scene.buildMonument('#FBBF24');
  let bi=0, rapport=50, depth=24;
  const stage=mShell(host,'panel',"The real thing. Lead with power, deploy a forged story, and close strong. Hover any term you forget.");
  stage.innerHTML=`<div class="pn-meters">
      <div class="meter rapport"><div class="mh"><span>Rapport</span><span class="mv" id="mvR">50</span></div><div class="mt"><div class="mf" id="mfR" style="width:50%"></div></div></div>
      <div class="meter depth"><div class="mh"><span>Depth</span><span class="mv" id="mvD">24</span></div><div class="mt"><div class="mf" id="mfD" style="width:24%"></div></div></div></div>
    <div id="pnDlg"></div>`;
  const D=$('#pnDlg');
  function meters(){ rapport=Math.max(0,Math.min(100,rapport)); depth=Math.max(0,Math.min(100,depth)); $('#mvR').textContent=Math.round(rapport);$('#mfR').style.width=rapport+'%';$('#mvD').textContent=Math.round(depth);$('#mfD').style.width=depth+'%'; }
  function vp(body,inner){ D.innerHTML=`<div class="dlg" style="opacity:1;transform:none;max-width:none"><div class="dlg-head"><div class="dlg-av" style="background:linear-gradient(135deg,#FBBF24,#05060a)">JP</div><div><div class="dlg-nm">Joanna Pierce</div><div class="dlg-rl">VP, Infrastructure</div></div></div><div class="dlg-body">${rich(body)}</div>${inner||''}</div>`; }
  function reply(text,fn){ const add=el(`<div style="margin-top:14px;border-top:1px solid var(--stroke);padding-top:12px"><div class="dlg-body">${rich(text)}</div><div class="dlg-next" style="margin-top:12px"><button class="btn btn-primary" id="pnNext">Continue →</button></div></div>`); D.querySelector('.dlg').appendChild(add); $('#pnNext').onclick=()=>{ sClick(); fn(); }; }
  function beat(){ if(bi>=PANEL.length) return verdict(); const b=PANEL[bi];
    if(b.type==='say'){ vp(b.text,`<div class="dlg-next"><button class="btn btn-primary" id="pnNext">Continue →</button></div>`); $('#pnNext').onclick=()=>{ sClick(); bi++; beat(); }; return; }
    if(b.story){ const keys=Object.keys(STAR);
      vp(b.q,`<div class="dlg-choices">${keys.map((k,i)=>`<button class="dlg-choice" data-k="${k}"><span class="ck">${i+1}</span><span>${STAR[k].title} <span class="muted" style="font-size:12px">· ${STAR[k].tag}${state.forged.has(k)?' · ✓ forged':''}</span></span></button>`).join('')}</div>`);
      D.querySelectorAll('.dlg-choice').forEach(btn=>btn.onclick=()=>{ const k=btn.dataset.k, f=state.forged.has(k); sClick(); depth+=f?18:9; rapport+=f?12:7; meters();
        D.querySelectorAll('.dlg-choice').forEach(x=>x.style.pointerEvents='none'); btn.classList.add('correct');
        reply(`You deploy **${STAR[k].title}** — <span style="font-style:italic">${rich(STAR[k].one)}</span><br><br>${f?'"That landed. Tight, quantified, and you owned it. That\'s how you tell it."':'"Decent — but you sharpened that story back on campus. Forge it and lead with the number."'}`,()=>{ bi++; beat(); }); });
      return; }
    vp(b.q,`<div class="dlg-choices">${b.choices.map((c,i)=>`<button class="dlg-choice" data-i="${i}"><span class="ck">${i+1}</span><span>${rich(c.t)}</span></button>`).join('')}</div>`);
    D.querySelectorAll('.dlg-choice').forEach(btn=>btn.onclick=()=>{ const c=b.choices[+btn.dataset.i]; sClick(); rapport+=c.rapport||0; depth+=c.depth||0; meters();
      D.querySelectorAll('.dlg-choice').forEach((x,j)=>{ x.style.pointerEvents='none'; if(b.choices[j].best)x.classList.add('correct'); else if(x===btn)x.classList.add('wrong'); });
      c.best?sOk():sNo(); reply(c.reply,()=>{ bi++; beat(); }); });
  }
  function verdict(){ const score=rapport*0.5+depth*0.5, offer=score>=60; const allMod=['power','thermal','star','jargon'].every(k=>state.done.has(k));
    if(offer){ state.panelDone=true; unlock('hired'); if(allMod)unlock('director'); } save(); renderHUD();
    Scene.flash&&Scene.flash(offer?'#34D399':'#FBBF24',0.2); offer?sWin():sNo();
    const rank=offer?(score>=82?'Director-level Hire':'Senior PM — Offer in Hand'):'Strong Callback';

/* =====================  GAME ENGINES (sequence / sort / pick) ===================== */
function makeSeq(id, levels, opts){ opts=opts||{}; return function(host,done){ const meta=metaOf(id); Scene.buildMonument&&Scene.buildMonument(meta.color); let li=0, miss=0;
  const stage=mShell(host,id,opts.obj||"Learn the sequence, then rebuild it from memory.");
  function teach(L){ stage.innerHTML=`<div class="pw-prompt">${rich(L.teach||("**"+L.title+"** — learn the order, then rebuild it:"))}</div>
    <div class="teach-chain">${L.items.map(it=>`<div class="tc-node" style="border-color:${meta.color};background:${hexA(meta.color,.08)}"><div class="tc-e">${it.e||'•'}</div><div class="tc-n">${it.n}</div></div>`).join('<span class="tc-ar">→</span>')}</div>
    ${L.note?`<div class="m-obj" style="display:block;margin-top:16px">${rich(L.note)}</div>`:''}
    <div style="text-align:right;margin-top:18px"><button class="btn btn-primary" id="goNext">Build it ▸</button></div>`;
    const g=$('#goNext'); if(g)g.onclick=()=>{ sClick(); quiz(L); }; }
  function quiz(L){ let filled=0; const order=L.items, tray=shuffle(order.map((it,i)=>({it,i})));
    const slots=order.map((it,i)=>`<div class="pw-slot" data-s="${i}">${i+1}</div>`).join('<span style="align-self:center;color:var(--muted2)">→</span>');
    stage.innerHTML=`<div class="pw-prompt">${rich("**Now from memory.** Tap the steps in the correct order.")}</div><div class="pw-chain">${slots}</div><div class="pw-tray">${tray.map(c=>`<button class="chip" data-i="${c.i}"><span class="ce">${c.it.e||'•'}</span>${c.it.n}</button>`).join('')}</div>`;
    stage.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{ if(ch.classList.contains('used'))return; const ci=+ch.dataset.i;
      if(ci===filled){ const slot=stage.querySelector(`.pw-slot[data-s="${filled}"]`); slot.classList.add('filled'); slot.innerHTML=`<span style="font-size:16px">${order[filled].e||'•'}</span>`; ch.classList.add('used'); sPower(); Scene.pulseAccent&&Scene.pulseAccent(); filled++; if(filled===order.length){ Scene.flash&&Scene.flash(meta.color,.18); setTimeout(next,560); } }
      else { miss++; sNo(); Scene.shake&&Scene.shake(); ch.animate&&ch.animate([{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(0)'}],{duration:240}); } }); }
  function next(){ li++; if(li<levels.length) teach(levels[li]); else fin(); }
  function fin(){ const stars=miss===0?3:miss<=2?2:1; mResult(host,id,{title:opts.win||"Sequence locked ✓",stars,xp:100+stars*40,skillKey:meta.skill,skillAmt:7+stars*4,sub:opts.sub||"",recap:opts.recap||[]},done); }
  teach(levels[0]);
}; }
function makeSort(id, rounds, opts){ opts=opts||{}; return function(host,done){ const meta=metaOf(id); Scene.buildMonument&&Scene.buildMonument(meta.color);
  let ri=0, correct=0, total=0; rounds.forEach(r=>total+=r.items.length);
  const stage=mShell(host,id,opts.obj||"Sort each item into the right group.");
  function teachR(R){ stage.innerHTML=`<div class="pw-prompt">${rich(R.teach||R.prompt)}</div>
    <div class="teach-chain">${R.buckets.map(b=>`<div class="tc-node" style="border-color:${meta.color};background:${hexA(meta.color,.08)};min-width:120px"><div class="tc-n">${b.name}</div>${b.hint?`<div style="font-size:11px;color:var(--muted);margin-top:5px;font-weight:400">${rich(b.hint)}</div>`:''}</div>`).join('')}</div>
    <div style="text-align:right;margin-top:18px"><button class="btn btn-primary" id="goNext">Start ▸</button></div>`;
    const g=$('#goNext'); if(g)g.onclick=()=>{ sClick(); round(R); }; }
  function round(R){ const items=shuffle(R.items.slice()); let ii=0;
    function show(){ if(ii>=items.length){ ri++; if(ri<rounds.length) teachR(rounds[ri]); else fin(); return; } const it=items[ii];
      stage.innerHTML=`<div class="pw-prompt">${rich(R.prompt)} <span class="muted" style="font-size:12px">(${ii+1}/${items.length})</span></div>
        <div class="sort-card" data-correct="${it.k}">${rich(it.t)}</div>
        <div class="sort-buckets">${R.buckets.map(b=>`<button class="sort-bucket" data-k="${b.k}">${b.name}</button>`).join('')}</div><div id="sortWhy"></div>`;
      stage.querySelectorAll('.sort-bucket').forEach(b=>b.onclick=()=>{ const ok=b.dataset.k===it.k;
        stage.querySelectorAll('.sort-bucket').forEach(x=>{ x.style.pointerEvents='none'; if(x.dataset.k===it.k)x.classList.add('correct'); else if(x===b)x.classList.add('wrong'); });
        if(ok){correct++;sOk();Scene.pulseAccent&&Scene.pulseAccent();}else{sNo();Scene.shake&&Scene.shake();}
        const why=it.why||("Belongs in: "+R.buckets.find(x=>x.k===it.k).name);
        $('#sortWhy').innerHTML=`<div class="m-obj" style="display:block;margin-top:14px">${ok?'✓ ':'✗ '}${rich(why)}</div><div style="text-align:right;margin-top:12px"><button class="btn btn-primary" id="goNext">Next ▸</button></div>`;
        const g=$('#goNext'); if(g)g.onclick=()=>{ sClick(); ii++; show(); }; }); }
    show(); }
  function fin(){ const stars=correct>=total?3:correct>=Math.ceil(total*.7)?2:1; mResult(host,id,{title:opts.win||"Sorted ✓",stars,xp:70+correct*22,skillKey:meta.skill,skillAmt:6+stars*4,eyebrow:correct+"/"+total,sub:opts.sub||"",recap:opts.recap||[]},done); }
  teachR(rounds[0]);
}; }
function makePick(id, questions, opts){ opts=opts||{}; return function(host,done){ const meta=metaOf(id); Scene.buildMonument&&Scene.buildMonument(meta.color);
  const qs=(opts.shuffle===false?questions.slice():shuffle(questions.slice())).slice(0,opts.count||questions.length); let qi=0, correct=0;
  const stage=mShell(host,id,opts.obj||"Pick the strongest answer.");
  function q(){ if(qi>=qs.length){ fin(); return; } const Q=qs[qi]; const o2=shuffle(Q.opts.slice());
    stage.innerHTML=`<div class="pw-prompt">${rich(Q.q)} <span class="muted" style="font-size:12px">(${qi+1}/${qs.length})</span></div>
      <div class="jg-opts">${o2.map(o=>`<button class="jg-opt" data-ok="${o.ok?1:0}">${rich(o.t)}</button>`).join('')}</div><div id="pkWhy"></div>`;
    stage.querySelectorAll('.jg-opt').forEach(b=>b.onclick=()=>{ const ok=b.dataset.ok==='1';
      stage.querySelectorAll('.jg-opt').forEach(x=>{ x.style.pointerEvents='none'; if(x.dataset.ok==='1')x.classList.add('correct'); else if(x===b)x.classList.add('wrong'); });
      if(ok){correct++;sOk();Scene.pulseAccent&&Scene.pulseAccent();}else{sNo();Scene.shake&&Scene.shake();}
      const why=((Q.opts.find(o=>o.ok)||{}).why)||Q.why||"";
      $('#pkWhy').innerHTML=(why?`<div class="m-obj" style="display:block;margin-top:14px">${ok?'✓ Correct. ':'✗ '}${rich(why)}</div>`:'')+`<div style="text-align:right;margin-top:12px"><button class="btn btn-primary" id="goNext">Next ▸</button></div>`;
      const g=$('#goNext'); if(g)g.onclick=()=>{ sClick(); qi++; q(); }; }); }
  function fin(){ const stars=correct>=qs.length?3:correct>=Math.ceil(qs.length*.7)?2:1; mResult(host,id,{title:opts.win||"Nailed it ✓",stars,xp:70+correct*28,skillKey:meta.skill,skillAmt:6+stars*4,eyebrow:correct+"/"+qs.length,sub:opts.sub||"",recap:opts.recap||[]},done); }
  q();
}; }
